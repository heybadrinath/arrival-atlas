name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.17"
          enable-cache: true

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --frozen --dev

      - name: Frontend quality checks
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Data-pipeline quality checks
        run: |
          uv run ruff check pipeline tests scripts/publish_dataset.py
          uv run pytest

  browser:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_DATA_BASE_URL: https://raw.githubusercontent.com/heybadrinath/arrival-atlas-data/main
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
