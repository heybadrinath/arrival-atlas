name: Publish release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Validate release metadata
        id: metadata
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi

          package_version="$(node -p "require('./package.json').version")"
          release_version="${GITHUB_REF_NAME#v}"
          if [ "$package_version" != "$release_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $package_version" >&2
            exit 1
          fi

          notes_file="docs/releases/${GITHUB_REF_NAME}.md"
          if [ ! -f "$notes_file" ]; then
            echo "Missing release notes: $notes_file" >&2
            exit 1
          fi

          main_sha="$(git ls-remote origin refs/heads/main | cut -f1)"
          if [ "$main_sha" != "$GITHUB_SHA" ]; then
            echo "Release tag must point to the current main commit" >&2
            exit 1
          fi

          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --target "$GITHUB_SHA" \
            --title "Arrival Atlas $GITHUB_REF_NAME" \
            --notes-file "${{ steps.metadata.outputs.notes_file }}" \
            --latest
